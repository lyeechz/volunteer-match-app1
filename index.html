<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volunteer Connect</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
<h1>Volunteer Connect</h1>
<p>Find volunteer opportunities that match your passion</p>
</header>
<section class="filters">
<h2>Find Opportunities</h2>
<select id="timeFilter">
<option value="all">Any Time Commitment</option>
<option value="short">1–2 hrs/week</option>
<option value="medium">3–5 hrs/week</option>
<option value="weekend">Weekends</option>
</select>
</section>
<section id="opportunities" class="opportunities"></section>
<script src="script.js"></script>
</body>
</html
